services:
  db:
    image: postgres:16
    container_name: kanban_postgres
    environment:
      POSTGRES_USER: kanban
      POSTGRES_PASSWORD: kanban_password
      POSTGRES_DB: kanban_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: